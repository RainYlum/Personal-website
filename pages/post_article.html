<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rylum - 发布文章</title>
  <link rel="stylesheet" href="/css/index.css">
  <link rel="stylesheet" href="/css/header.css">
  <link rel="stylesheet" href="/css/footer.css">
  <link rel="stylesheet" href="/css/post_article.css">
  <link rel="stylesheet" href="/css/musicPlayer.css">
  <link rel="stylesheet" href="/css/agent.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>
  <div class="main" id="main">

    <div class="main-content">
      <div class="post-article-container">
        <div class="post-article-header">
          <h2>发布文章</h2>
        </div>

        <form class="post-article-form" id="postArticleForm">
          <div class="form-group">
            <label for="articleTitle">文章标题</label>
            <input type="text" id="articleTitle" placeholder="请输入文章标题" required>
          </div>

          <div class="form-group">
            <label for="articleCategory">分类</label>
            <select id="articleCategory" required>
              <option value="">请选择分类</option>
              <option value="技术分享">技术分享</option>
              <option value="个人日记">个人日记</option>
              <option value="旅行日记">旅行日记</option>
              <option value="生活随笔">生活随笔</option>
              <option value="其他">其他</option>
            </select>
          </div>

          <div class="form-group">
            <label for="articleSummary">文章摘要</label>
            <textarea id="articleSummary" rows="3" placeholder="请输入文章摘要（简短描述文章内容）" required></textarea>
          </div>

          <div class="form-group">
            <label for="articleContent">文章内容</label>
            <div class="editor-container">
              <div class="editor-toolbar">
                <button type="button" class="toolbar-btn" data-action="h2" title="标题2">
                  <i class="bi bi-type-h2"></i>
                </button>
                <button type="button" class="toolbar-btn" data-action="h3" title="标题3">
                  <i class="bi bi-type-h3"></i>
                </button>
                <button type="button" class="toolbar-btn" data-action="h4" title="标题4">
                  <i class="bi bi-type-h4"></i>
                </button>
                <div class="toolbar-divider"></div>
                <button type="button" class="toolbar-btn" data-action="bold" title="加粗">
                  <i class="bi bi-type-bold"></i>
                </button>
                <button type="button" class="toolbar-btn" data-action="italic" title="斜体">
                  <i class="bi bi-type-italic"></i>
                </button>
                <button type="button" class="toolbar-btn" data-action="strikethrough" title="删除线">
                  <i class="bi bi-type-strikethrough"></i>
                </button>
                <div class="toolbar-divider"></div>

                <button type="button" class="toolbar-btn" data-action="quote" title="引用">
                  <i class="bi bi-quote"></i>
                </button>
                <button type="button" class="toolbar-btn" data-action="list" title="无序列表">
                  <i class="bi bi-list-ul"></i>
                </button>
                <button type="button" class="toolbar-btn" data-action="olist" title="有序列表">
                  <i class="bi bi-list-ol"></i>
                </button>
                <div class="toolbar-divider"></div>
                <button type="button" class="toolbar-btn" data-action="link" title="链接">
                  <i class="bi bi-link-45deg"></i>
                </button>
                <button type="button" class="toolbar-btn" data-action="image" title="图片">
                  <i class="bi bi-image"></i>
                </button>
                <button type="button" class="toolbar-btn" data-action="hr" title="分割线">
                  <i class="bi bi-dash"></i>
                </button>
              </div>
              <div class="editor-panels">
                <div class="editor-panel editor-preview" id="editorPreview">
                  <div class="preview-header">
                    <i class="bi bi-eye"></i>
                    <span>实时预览</span>
                  </div>
                  <div class="preview-content" id="previewContent"></div>
                </div>
                <div class="editor-panel editor-edit" id="editorEdit">
                  <div class="edit-header">
                    <i class="bi bi-pencil"></i>
                    <span>编辑器</span>
                  </div>
                  <textarea id="articleContent" rows="20" placeholder="请输入文章内容..." required></textarea>
                </div>
              </div>
            </div>
            <input type="file" id="imageUpload" accept="image/*" style="display: none;">
          </div>

          <div class="form-actions">
            <button type="button" class="cancel-btn" id="cancelPostBtn">取消</button>
            <button type="submit" class="confirm-btn">发布文章</button>
          </div>
        </form>
      </div>
    </div>

    <div class="left-nav">
      <h2 class="nav-title">侧边栏</h2>
      <ul>
        <li><a href="/index.html#main">论坛</a></li>
        <li><a href="/pages/user_center.html">用户中心</a></li>
      </ul>
    </div>

  </div>

</body>

<script src="/js/common.js"></script>
<script src="/js/post_article.js"></script>
<script src="/js/musicPlayer.js"></script>
<script src="/js/agent.js"></script>
<script src="/js/components.js"></script>

</html>
