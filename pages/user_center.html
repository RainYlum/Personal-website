<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rylum - 用户中心</title>
  <link rel="stylesheet" href="/css/index.css">
  <link rel="stylesheet" href="/css/header.css">
  <link rel="stylesheet" href="/css/footer.css">
  <link rel="stylesheet" href="/css/musicPlayer.css">
  <link rel="stylesheet" href="/css/agent.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>
  <div class="main" id="main">

    <div class="main-content">
      <div class="user-profile-container">
        <div class="profile-header">
          <div class="profile-avatar">
            <img id="profileAvatar" src="/assets/img/user.png" alt="头像">
          </div>
          <div class="profile-info">
            <h1 class="profile-nickname" id="profileNickname">未登录</h1>
            <p class="visitor-label" id="visitorLabel" style="display: none;">访客模式</p>
            <div class="profile-actions">
              <button class="edit-profile-btn" id="editProfileBtn">编辑资料</button>
              <button class="post-article-btn" id="postArticleBtn">发布文章</button>
            </div>
          </div>
        </div>

        <div class="profile-details">
          <div class="detail-item" id="emailDetail">
            <span class="detail-label">邮箱</span>
            <span class="detail-value" id="profileEmail">-</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">注册时间</span>
            <span class="detail-value" id="profileCreatedAt">-</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">最后登录</span>
            <span class="detail-value" id="profileLastLogin">-</span>
          </div>
        </div>
      </div>

      <div class="edit-profile-section" id="editProfileSection" style="display: none;">
        <h2 class="section-title">编辑资料</h2>
        <form class="edit-profile-form" id="editProfileForm">
          <div class="form-group">
            <label for="editEmail">邮箱</label>
            <input type="email" id="editEmail" placeholder="请输入邮箱">
          </div>
          <div class="form-group">
            <label for="editPassword">新密码</label>
            <input type="password" id="editPassword" placeholder="不修改请留空">
          </div>
          <div class="form-group">
            <label for="editConfirmPassword">确认密码</label>
            <input type="password" id="editConfirmPassword" placeholder="确认新密码">
          </div>
          <div class="form-actions">
            <button type="button" class="cancel-btn" id="cancelEditBtn">取消</button>
            <button type="submit" class="confirm-btn">保存</button>
          </div>
        </form>
      </div>
    </div>

    <div class="left-nav">
      <h2 class="nav-title">侧边栏</h2>
      <ul>
        <li><a href="/index.html#main">论坛</a></li>
        <li><a href="/pages/user_center.html">用户中心</a></li>
      </ul>
    </div>

  </div>

</body>

<script src="/js/common.js"></script>
<script src="/js/user_center.js"></script>
<script src="/js/musicPlayer.js"></script>
<script src="/js/agent.js"></script>
<script src="/js/components.js"></script>

</html>
