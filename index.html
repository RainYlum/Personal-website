<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rylum</title>
  <link rel="stylesheet" href="./css/index.css">
</head>

<body>
  <div class="header">



    <div class="nav">
      <ul>
        <li><a href="index.html">首页</a></li>
        <li><a href="#main">论坛</a></li>
        <li><a href="#">资源</a></li>
        <li><a href="#">音乐</a></li>
        <li><a href="./pages/user_center.html" id="userCenterLink">用户中心</a></li>
        <li><a href="#">???</a></li>
      </ul>

      <button class="type-change-button">&#8644;</button>

      <div class="user-card" id="userCard">
        <p class="user-name">未登录</p>
        <img class="user-img" src="./assets/img/user.png" alt="用户头像">

        <!-- 下拉菜单 -->
        <div class="user-dropdown" id="userDropdown">
          <div class="dropdown-header">
            <img class="dropdown-avatar" src="./assets/img/user.png" alt="头像">
            <div class="dropdown-info">
              <p class="dropdown-name">测试用户</p>
              <p class="dropdown-email">test@example.com</p>
            </div>
          </div>
          <div class="dropdown-divider"></div>
          <div class="dropdown-menu">
            <button class="dropdown-item" id="changeAvatarBtn">更换头像</button>
            <button class="dropdown-item" id="logoutBtn">退出登录</button>
          </div>
        </div>
      </div>

    </div>

    <!-- 头像上传模态框 -->
    <div class="modal-overlay" id="avatarModal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>更换头像</h3>
          <button class="modal-close" id="modalClose">&times;</button>
        </div>
        <div class="modal-body">
          <div class="avatar-preview">
            <img id="previewImg" src="./assets/img/user.png" alt="预览">
          </div>
          <input type="file" id="avatarInput" accept="image/jpeg,image/png,image/gif" style="display: none;">
          <button class="upload-btn" id="selectFileBtn">选择图片</button>
          <p class="upload-hint">支持 JPG、PNG、GIF 格式，最大 5MB</p>
        </div>
        <div class="modal-footer">
          <button class="cancel-btn" id="cancelBtn">取消</button>
          <button class="confirm-btn" id="uploadBtn">上传</button>
        </div>
      </div>
    </div>

    <div class="banner">
      <h2 class="banner-title">展示标题</h2>
      <p class="banner-docs">ここからRE:START！</p>
      <div class="banner-imgs">
        <img class="banner-img" src="./assets/img/banner-airi.png" alt=" 展示图片">
      </div>
    </div>

  </div>

  <div class="main" id="main">

    <div class="main-content">

    </div>

    <div class="left-nav">
      <h2 class="nav-title">侧边栏</h2>
      <ul>
        <li><a href="#">导航项1</a></li>
        <li><a href="#">导航项2</a></li>
        <li><a href="#">导航项3</a></li>
      </ul>
    </div>

  </div>

  <div class="footer">
    <p>Copyright &copy; 2023 Rylum. All rights reserved.</p>
    <p>Contact: <a href="mailto:contact@rylum.com">contact@rylum.com</a></p>
    <p>Address: 123 Main St, Anytown, USA</p>
    <p>Phone: +1234567890</p>
  </div>

  <div class="musicPlayer">
    <template id="musicPlayerTemplate"></template>
  </div>



</body>

<script src="./js/index.js"></script>

</html>
