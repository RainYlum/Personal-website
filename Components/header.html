<div class="header">
  <div class="nav">
    <button class="nav-toggle" id="navToggle" aria-label="菜单">
      <i class="bi bi-list"></i>
    </button>
    <ul id="navMenu">
      <li><a href="/index.html">首页</a></li>
      <li><a href="/index.html#main">论坛</a></li>
      <li><a href="#">资源</a></li>
      <li><a href="#">音乐</a></li>
      <li><a href="/pages/user_center.html" id="userCenterLink">用户中心</a></li>
    </ul>

    <div class="user-card" id="userCard">
      <p class="user-name">未登录</p>
      <img class="user-img" src="/assets/img/user.png" alt="用户头像">

      <div class="user-dropdown" id="userDropdown">
        <div class="dropdown-header" id="dropdownHeader">
          <img class="dropdown-avatar" src="/assets/img/user.png" alt="头像">
          <div class="dropdown-info">
            <p class="dropdown-name">测试用户</p>
            <p class="dropdown-email">test@example.com</p>
          </div>
        </div>
        <div class="dropdown-divider"></div>
        <div class="dropdown-menu">
          <button class="dropdown-item" id="changeAvatarBtn">更换头像</button>
          <button class="dropdown-item" id="logoutBtn">退出登录</button>
        </div>
      </div>
    </div>

  </div>

  <div class="modal-overlay" id="avatarModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>更换头像</h3>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body">
        <div class="avatar-preview">
          <img id="previewImg" src="/assets/img/user.png" alt="预览">
        </div>
        <input type="file" id="avatarInput" accept="image/jpeg,image/png,image/gif" style="display: none;">
        <button class="upload-btn" id="selectFileBtn">选择图片</button>
        <p class="upload-hint">支持 JPG、PNG、GIF 格式，最大 5MB</p>
      </div>
      <div class="modal-footer">
        <button class="cancel-btn" id="cancelBtn">取消</button>
        <button class="confirm-btn" id="uploadBtn">上传</button>
      </div>
    </div>
  </div>

</div>
