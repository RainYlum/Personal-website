<div class="agentComponent minimized" id="agentComponent">
  <div class="agentComponent-toggle" id="agentComponentToggle">🤖</div>
  
  <div class="agentComponent-content" style="display: none;">
    <div class="agentComponent-header">
      <div class="agentComponent-title">AI 助手</div>
      <div class="agentComponent-header-actions">
        <button class="agentComponent-clear" id="agentClearBtn">🗑️</button>
        <button class="agentComponent-close" id="agentComponentClose">✕</button>
      </div>
    </div>
    
    <div class="agentComponent-body">
      <div class="agentComponent-messages" id="agentMessages">
        <div class="agent-message agent-message-bot">
          <span class="agent-message-avatar">🤖</span>
          <span class="agent-message-content">你好！我是你的 AI 助手，有什么可以帮你的吗？</span>
        </div>
      </div>
      
      <div class="agentComponent-input">
        <input type="text" id="agentInput" placeholder="输入消息...">
        <button id="agentSendBtn">发送</button>
      </div>
    </div>
  </div>
</div>
