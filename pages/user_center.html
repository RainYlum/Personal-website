<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rylum - 用户中心</title>
  <link rel="stylesheet" href="../css/index.css">
</head>

<body>
  <div class="header">
    <div class="nav">
      <ul>
        <li><a href="../index.html">首页</a></li>
        <li><a href="../index.html#main">论坛</a></li>
        <li><a href="#">资源</a></li>
        <li><a href="#">音乐</a></li>
        <li><a href="user_center.html">用户中心</a></li>
        <li><a href="#">???</a></li>
      </ul>

      <button class="type-change-button">&#8644;</button>

      <div class="user-card" id="userCard">
        <p class="user-name">未登录</p>
        <img class="user-img" src="../assets/img/user.png" alt="用户头像">

        <div class="user-dropdown" id="userDropdown">
          <div class="dropdown-header" id="dropdownHeader">
            <img class="dropdown-avatar" src="../assets/img/user.png" alt="头像">
            <div class="dropdown-info">
              <p class="dropdown-name">测试用户</p>
              <p class="dropdown-email">test@example.com</p>
            </div>
          </div>
          <div class="dropdown-divider"></div>
          <div class="dropdown-menu">
            <button class="dropdown-item" id="changeAvatarBtn">更换头像</button>
            <button class="dropdown-item" id="logoutBtn">退出登录</button>
          </div>
        </div>
      </div>

    </div>

    <div class="modal-overlay" id="avatarModal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>更换头像</h3>
          <button class="modal-close" id="modalClose">&times;</button>
        </div>
        <div class="modal-body">
          <div class="avatar-preview">
            <img id="previewImg" src="../assets/img/user.png" alt="预览">
          </div>
          <input type="file" id="avatarInput" accept="image/jpeg,image/png,image/gif" style="display: none;">
          <button class="upload-btn" id="selectFileBtn">选择图片</button>
          <p class="upload-hint">支持 JPG、PNG、GIF 格式，最大 5MB</p>
        </div>
        <div class="modal-footer">
          <button class="cancel-btn" id="cancelBtn">取消</button>
          <button class="confirm-btn" id="uploadBtn">上传</button>
        </div>
      </div>
    </div>

  </div>

  <div class="main" id="main">

    <div class="main-content">
      <div class="user-profile-container">
        <div class="profile-header">
          <div class="profile-avatar">
            <img id="profileAvatar" src="../assets/img/user.png" alt="头像">
          </div>
          <div class="profile-info">
            <h1 class="profile-nickname" id="profileNickname">未登录</h1>
            <p class="visitor-label" id="visitorLabel" style="display: none;">访客模式</p>
            <div class="profile-actions">
              <button class="edit-profile-btn" id="editProfileBtn">编辑资料</button>
              <button class="post-article-btn" id="postArticleBtn">发布文章</button>
            </div>
          </div>
        </div>

        <div class="profile-details">
          <div class="detail-item" id="emailDetail">
            <span class="detail-label">邮箱</span>
            <span class="detail-value" id="profileEmail">-</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">注册时间</span>
            <span class="detail-value" id="profileCreatedAt">-</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">最后登录</span>
            <span class="detail-value" id="profileLastLogin">-</span>
          </div>
        </div>
      </div>

      <div class="edit-profile-section" id="editProfileSection" style="display: none;">
        <h2 class="section-title">编辑资料</h2>
        <form class="edit-profile-form" id="editProfileForm">
          <div class="form-group">
            <label for="editEmail">邮箱</label>
            <input type="email" id="editEmail" placeholder="请输入邮箱">
          </div>
          <div class="form-group">
            <label for="editPassword">新密码</label>
            <input type="password" id="editPassword" placeholder="不修改请留空">
          </div>
          <div class="form-group">
            <label for="editConfirmPassword">确认密码</label>
            <input type="password" id="editConfirmPassword" placeholder="确认新密码">
          </div>
          <div class="form-actions">
            <button type="button" class="cancel-btn" id="cancelEditBtn">取消</button>
            <button type="submit" class="confirm-btn">保存</button>
          </div>
        </form>
      </div>
    </div>

    <div class="left-nav">
      <h2 class="nav-title">侧边栏</h2>
      <ul>
        <li><a href="../index.html#main">论坛</a></li>
        <li><a href="user_center.html">用户中心</a></li>
      </ul>
    </div>

  </div>

  <div class="footer">
    <p>Copyright &copy; 2023 Rylum. All rights reserved.</p>
    <p>Contact: <a href="mailto:contact@rylum.com">contact@rylum.com</a></p>
    <p>Address: 123 Main St, Anytown, USA</p>
    <p>Phone: +1234567890</p>
  </div>

  <div class="musicPlayer">
    <template id="musicPlayerTemplate"></template>
  </div>

</body>

<script src="../js/user_center.js"></script>

</html>
