<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rylum</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="/css/index.css">
  <link rel="stylesheet" href="/css/header.css">
  <link rel="stylesheet" href="/css/footer.css">
  <link rel="stylesheet" href="/css/musicPlayer.css">
  <link rel="stylesheet" href="/css/agent.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>
  <div class="announcement-overlay" id="announcementOverlay">
    <div class="announcement-modal">
      <button class="announcement-close" id="announcementClose">×</button>
      <div class="announcement-icon">🚧</div>
      <h3>网站开发中</h3>
      <p>感谢您访问我的个人博客！</p>
      <p>本网站目前正在开发中，部分功能可能尚未完善。如果您遇到任何问题或发现 bug，请谅解。</p>
      <p>您可以通过文章评论功能给我留言反馈，我会尽快处理。</p>
      <p class="announcement-date">更新时间：2026年7月</p>
    </div>
  </div>

  <div class="banner" id="homeBanner">
    <h2 class="banner-title">展示标题</h2>
    <p class="banner-docs">ここからRE:START！</p>
    <div class="banner-imgs">
      <img class="banner-img active" src="/assets/img/banner-mnr.png" alt="展示图片">
      <img class="banner-img" src="/assets/img/banner-airi.png" alt="展示图片">
      <img class="banner-img" src="/assets/img/banner-szk.png" alt="展示图片">
      <img class="banner-img" src="/assets/img/banner-hrk.png" alt="展示图片">
    </div>
  </div>

  <div class="main" id="main">

    <div class="main-content">

    </div>

    <div class="left-nav">
      <div class="user-card" id="userCard">
        <img class="user-img" src="/assets/img/user.png" alt="用户头像">
        <p class="user-name">未登录</p>

        <div class="user-dropdown" id="userDropdown">
          <div class="dropdown-header" id="dropdownHeader">
            <img class="dropdown-avatar" src="/assets/img/user.png" alt="头像">
            <div class="dropdown-info">
              <p class="dropdown-name">测试用户</p>
              <p class="dropdown-email">test@example.com</p>
            </div>
          </div>
          <div class="dropdown-divider"></div>
          <div class="dropdown-menu">
            <button class="dropdown-item" id="changeAvatarBtn">更换头像</button>
            <button class="dropdown-item" id="logoutBtn">退出登录</button>
          </div>
        </div>
      </div>

      <h2 class="nav-title">导航</h2>
      <ul>
        <li><a href="/index.html">首页</a></li>
        <li><a href="/pages/forum.html">论坛</a></li>
        <li><a href="/pages/user_center.html">用户中心</a></li>
      </ul>
    </div>

  </div>

</body>

<script src="/js/common.js"></script>
<script src="/js/index.js"></script>
<script src="/js/musicPlayer.js"></script>
<script src="/js/agent.js"></script>
<script src="/js/components.js"></script>

</html>
